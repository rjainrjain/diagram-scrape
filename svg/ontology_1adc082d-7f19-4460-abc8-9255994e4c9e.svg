llation span{fill:#FEF3BA!important;stroke:#000000!important;}#my-svg .Place&gt;*{fill:#94CC7D!important;stroke:#000000!important;}#my-svg .Place span{fill:#94CC7D!important;stroke:#000000!important;}#my-svg .Persistent_Item&gt;*{fill:#FFFFFF!important;stroke:#000000!important;}#my-svg .Persistent_Item span{fill:#FFFFFF!important;stroke:#000000!important;}#my-svg .Conceptual_Object&gt;*{fill:#FDDC34!important;stroke:#000000!important;}#my-svg .Conceptual_Object span{fill:#FDDC34!important;stroke:#000000!important;}#my-svg .Physical_Thing&gt;*{fill:#E1BA9C!important;stroke:#000000!important;}#my-svg .Physical_Thing span{fill:#E1BA9C!important;stroke:#000000!important;}#my-svg .Actor&gt;*{fill:#ffbdca!important;stroke:#000000!important;}#my-svg .Actor span{fill:#ffbdca!important;stroke:#000000!important;}#my-svg .PC_Classes&gt;*{fill:#cc80ff!important;stroke:#000000!important;}#my-svg .PC_Classes span{fill:#cc80ff!important;stroke:#000000!important;}#my-svg .Multi&gt;*{fill:#cccccc!important;stroke:#000000!important;}#my-svg .Multi span{fill:#cccccc!important;stroke:#000000!important;}</style><g><marker orient="auto" markerHeight="8" markerWidth="8" markerUnits="userSpaceOnUse" refY="5" refX="5" viewBox="0 0 10 10" class="marker flowchart-v2" id="my-svg_flowchart-v2-pointEnd"><path style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker orient="auto" markerHeight="8" markerWidth="8" markerUnits="userSpaceOnUse" refY="5" refX="4.5" viewBox="0 0 10 10" class="marker flowchart-v2" id="my-svg_flowchart-v2-pointStart"><path style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 0 5 L 10 10 L 10 0 z"/></marker><marker orient="auto" markerHeight="11" markerWidth="11" markerUnits="userSpaceOnUse" refY="5" refX="11" viewBox="0 0 10 10" class="marker flowchart-v2" id="my-svg_flowchart-v2-circleEnd"><circle style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" r="5" cy="5" cx="