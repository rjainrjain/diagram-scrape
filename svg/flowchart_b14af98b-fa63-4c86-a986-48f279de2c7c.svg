ll; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Start</p></span></div></foreignObject></g></g><g transform="translate(147, 140.5)" id="flowchart-preparation1-1" class="node default"><polygon transform="translate(-129.25,43.5)" class="label-container" points="21.75,0 236.75,0 258.5,-43.5 236.75,-87 21.75,-87 0,-43.5"/><g transform="translate(-100, -36)" style="" class="label"><rect/><foreignObject height="72" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>h stands for harry\nl stands for laras\nint harry;\nint laras;</p></span></div></foreignObject></g></g><g transform="translate(147, 289.5)" id="flowchart-preparation2-3" class="node default"><polygon transform="translate(-135.25,55.5)" class="label-container" points="27.75,0 242.75,0 270.5,-55.5 242.75,-111 27.75,-111 0,-55.5"/><g transform="translate(-100, -48)" style="" class="label"><rect/><foreignObject height="96" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Determine the equation based on the question\nh - 2 = 6(l - 2)\n h + 18 = 2(l + 18)</p></span></div></foreignObject></g></g><g transform="translate(147, 470)" id="flowchart-calculation1-5" class="node default"><rect height="150" width="260" y="-75" x="-130" style="" class="basic label-container"/><g transform="translate(-100, -60)" style="" class="label"><rect/><foreignObject height="120" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Determine the age of laras using substitution \n h - 2 = 6l - 12 \n h + 18 = 2l + 36 \n h - 6l = -10 \n h - 2l = 18 \n h = 6l - 10</p></span></div></foreignObject></g></g><g transform="translate(147, 670)" id="flowchart-calculation2-7" class="node default"><rect height="150" width="260" y="-75" x="-130" style="" class="basic label-container"/><g transform="translate(-100, -60)" style="" class="label"><rect/><foreignObject height="120" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Substitute the known h value to the first equation\nh - 2l = 18\n6l - 10 - 2l = 18 \n 4l = 28 \n l = 28/4 \n l = 7</p></span></div></foreignObject></g></g><g transform="translate(147, 870)" id="flowchart-calculation3-9" class="node default"><rect height="150" width="260" y="-75" x="-130" style="" class="basic label-container"/><g transform="translate(-100, -60)" style="" class="label"><rect/><foreignObject height="120" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Determine the age of harry using substitution \n h - 2 = 6l - 12 \n h - 2 = 6(7) - 12 \n h - 2 = 42 - 12 \n h = 42 + 2 - 12 \n h = 32</p></span></div></foreignObject></g></g><g transform="translate(147, 1026.5)" id="flowchart-output-11" class="node default"><polygon transform="translate(-107.5,31.5)" class="label-container" points="-31.5,0 215,0 246.5,-63 0,-63"/><g transform="translate(-100, -24)" style="" class="label"><rect/><foreignObject height="48" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Harry's age is 32\nLaras' age is 7</p></span></div></foreignObject></g></g><g transform="translate(147, 1127.5)" id="flowchart-finish-13" class="node default"><rect height="39" width="50.984375" y="-19.5" x="-25.4921875" ry="19.5" rx="19.5" style="" class="basic label-container"/><g transform="translate(-13.1171875, -12)" style="" class="label"><rect/><foreignObject height="24" width="26.234375"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>End</p></span></div></foreignObject></g></g></g></g></g></svg>