 style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">Unsupported markdown: list</span></div></foreignObject></g></g><g transform="translate(210.375, 524.5)" id="flowchart-1-1" class="node default Literal"><rect height="759" width="404.75" y="-379.5" x="-202.375" ry="379.5" rx="379.5" style="fill:#ffffff !important;stroke:#000000 !important" class="basic label-container"/><g transform="translate(-100, -372)" style="" class="label"><rect/><foreignObject height="744" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>''Yousuf Karsh CC (December 23, 1908 – July 13, 2002) was an Armenian-Canadian photographer known for his portraits of notable individuals. He has been described as one of the greatest portrait photographers of the 20th century. An Armenian genocide survivor, Karsh migrated to Canada as a refugee. By the 1930s he established himself as a significant photographer in Ottawa, where he lived most of his adult life, though he traveled extensively for work. His iconic 1941 photograph of Winston Churchill was a breakthrough point in his 60-year career, through which he took numerous photos of known political leaders, men and women of arts and sciences. Over 20 photos by Karsh appeared on the cover of <em>Life</em> magazine, until he retired in 1992.''@en</p></span></div></foreignObject></g></g><g transform="translate(578.125, 524.5)" id="flowchart-2-3" class="node default Literal"><rect height="63" width="230.75" y="-31.5" x="-115.375" ry="31.5" rx="31.5" style="fill:#ffffff !important;stroke:#000000 !important" class="basic label-container"/><g transform="translate(-100, -24)" style="" class="label"><rect/><foreignObject height="48" width="200"><div style="display: table; white-space: b